spring:
  application:
    name: ride-hailing-system
  flyway:
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://localhost:5432/ridehailing_db
    username: ridehailing_admin
    password: password123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # dialect: org.hibernate.spatial.dialect.postgis.PostgisDialect # Not needed in Hibernate 6
        format_sql: true
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ride-group
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
